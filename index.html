<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 朋友圈文案生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <style>
        /* 宇宙深空背景 */
        body {
            background-color: #0b0c10;
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(76, 29, 149, 0.25), transparent 40%),
                radial-gradient(circle at 85% 70%, rgba(30, 64, 175, 0.25), transparent 50%);
            background-attachment: fixed;
            color: #e0e2eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* 极致玻璃拟态 (Glassmorphism) */
        .glass-panel {
            background: rgba(20, 22, 32, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.6), 
                inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }
        
        /* 自定义微型滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        /* ======== 核心：弹簧回弹阻尼物理动效 ======== */
        :root {
            --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .spring-interactive {
            transition: all 0.6s var(--spring-easing);
            will-change: transform;
        }

        .spring-interactive:hover:not(:disabled) {
            transform: scale(1.04);
            box-shadow: 0 12px 25px -5px rgba(139, 92, 246, 0.4);
        }

        .spring-interactive:active:not(:disabled) {
            transform: scale(0.96);
            transition: all 0.1s ease-out;
        }

        .drag-spring {
            transition: all 0.5s var(--spring-easing);
        }
        .drag-spring.is-active {
            transform: scale(1.03);
            border-color: #a855f7;
            background-color: rgba(168, 85, 247, 0.15);
            box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.2);
        }

        /* 多图网格样式 */
        .multi-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .preview-thumb {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
        }
        .preview-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-thumb .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 26px;
            height: 26px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            z-index: 10;
        }
        /* 桌面端：hover 时显示删除按钮 */
        @media (hover: hover) and (pointer: fine) {
            .preview-thumb .remove-btn { opacity: 0; }
            .preview-thumb:hover .remove-btn { opacity: 1; }
        }
        /* 移动端触屏设备：始终显示删除按钮 */
        @media (hover: none), (pointer: coarse) {
            .preview-thumb .remove-btn { opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8 antialiased min-h-screen">

    <div id="app" class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 pt-4 md:pt-10">
        
        <div class="glass-panel rounded-3xl p-6 md:p-8 flex flex-col h-auto md:h-[680px]">
            <h1 class="text-3xl font-bold tracking-wider mb-2 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-300 drop-shadow-md">
                AI Moment ✨
            </h1>
            <p class="text-gray-400 text-sm mb-6">上传你的影像（最多9张），让通义千问为你注入灵魂文案。</p>

            <!-- 多图上传区（空状态） -->
            <div v-if="previewUrls.length === 0"
                class="drag-spring relative border-2 border-dashed rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden group h-48 flex-shrink-0"
                :class="isDragging ? 'is-active' : 'border-gray-600 hover:border-purple-400'"
                @click="triggerUpload"
                @dragover.prevent="isDragging = true"
                @dragleave.prevent="isDragging = false"
                @drop.prevent="handleDrop"
            >
                <svg class="w-10 h-10 mb-3 transition-colors duration-300" :class="isDragging ? 'text-purple-400' : 'text-gray-500 group-hover:text-purple-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                <span class="transition-colors font-medium tracking-wide text-sm" :class="isDragging ? 'text-purple-300' : 'text-gray-400 group-hover:text-purple-300'">
                    {{ isDragging ? '松开鼠标即可吸附图片' : '点击或拖拽上传图片（支持多选）' }}
                </span>
                <span class="text-xs text-gray-600 mt-2">支持 JPG / PNG / WebP，最多 9 张</span>
            </div>

            <!-- 已选图片预览网格 -->
            <div v-else class="flex-shrink-0">
                <div class="multi-preview-grid">
                    <div v-for="(url, index) in previewUrls" :key="index" class="preview-thumb">
                        <img :src="url" alt="Preview">
                        <div class="remove-btn" @click.stop="removeImage(index)">✕</div>
                    </div>
                    <!-- 添加更多图片按钮 -->
                    <div v-if="previewUrls.length < 9"
                        class="aspect-square rounded-xl border-2 border-dashed border-gray-600 hover:border-purple-400 flex items-center justify-center cursor-pointer transition-colors"
                        @click.stop="triggerUpload"
                    >
                        <svg class="w-8 h-8 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-2 text-center">已选 {{ previewUrls.length }} 张图片，点击 ✕ 移除</p>
            </div>

            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-300 mb-3 drop-shadow">设定文案风格</label>
                <div class="flex flex-wrap gap-2">
                    <button 
                        v-for="style in predefinedStyles" 
                        :key="style"
                        @click="selectedStyle = style"
                        :class="['spring-interactive px-4 py-1.5 rounded-full text-sm font-medium border', 
                                 selectedStyle === style ? 'bg-purple-600 border-purple-500 text-white shadow-[0_0_15px_rgba(147,51,234,0.4)]' : 'bg-transparent border-gray-600 text-gray-400 hover:text-gray-200']"
                    >
                        {{ style }}
                    </button>
                </div>
            </div>

            <div class="mt-5 flex-1 flex flex-col">
                <label class="block text-sm font-medium text-gray-300 mb-2 drop-shadow">补充自定义细节 (可选)</label>
                <textarea 
                    v-model="userDirection" 
                    class="w-full flex-1 bg-black bg-opacity-30 text-gray-200 border border-gray-700 rounded-2xl p-4 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 resize-none text-sm transition-colors duration-300"
                    placeholder="例如：要简短一点、加上定位在西安、以第一人称口吻写..."
                ></textarea>
            </div>

            <button 
                @click="generateCopy" 
                :disabled="isLoading || files.length === 0"
                class="spring-interactive mt-6 w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-4 px-6 rounded-2xl disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center flex-shrink-0 shadow-lg"
            >
                <svg v-if="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                {{ isLoading ? 'AI 大脑高速运转中...' : '生成专属文案' }}
            </button>
        </div>

        <div ref="resultArea" class="glass-panel rounded-3xl p-6 md:p-8 flex flex-col h-auto min-h-[400px] md:h-[680px] relative overflow-hidden">
            
            <div v-if="!resultText && !isLoading" class="flex-1 flex flex-col items-center justify-center text-gray-500">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p class="tracking-wide text-sm">灵感结果将在这里浮现</p>
            </div>

            <div v-else-if="isLoading" class="flex-1 flex flex-col items-center justify-center">
                <div class="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(168,85,247,0.5)]"></div>
                <p class="mt-6 text-purple-400 animate-pulse tracking-widest text-sm drop-shadow-md">正在通过云端网络解析影像特征...</p>
            </div>

            <div v-else class="flex-1 overflow-y-auto pr-2">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-1.5 h-8 bg-gradient-to-b from-purple-400 to-indigo-500 rounded-full shadow-[0_0_8px_rgba(168,85,247,0.8)]"></div>
                    <h2 class="text-xl font-bold text-white tracking-wider">创作输出</h2>
                </div>
                
                <div class="text-gray-200 leading-loose whitespace-pre-wrap font-light text-lg">
                    {{ resultText }}
                </div>

                <div class="mt-10 pt-6 border-t border-gray-700 border-opacity-50">
                    <p class="text-xs text-gray-500 tracking-wider">云端影像备份归档：</p>
                    <div v-for="(url, index) in resultImageUrls" :key="index" class="mt-2">
                        <a :href="url" target="_blank" class="text-xs text-purple-400 hover:text-purple-300 break-all truncate block transition-colors">
                            {{ url }}
                        </a>
                    </div>
                </div>
            </div>
        </div>

    <!-- 全局唯一的隐藏 file input（必须在 #app 内部才能被 Vue 管理） -->
    <input type="file" ref="fileInput" @change="handleFileChange" accept="image/*" multiple
        style="position:fixed;top:-9999px;left:-9999px;width:0;height:0;opacity:0;pointer-events:none;">

    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const fileInput = ref(null);
                const files = ref([]);
                const previewUrls = ref([]);
                const resultArea = ref(null);
                
                const predefinedStyles = ['文艺诗意', '幽默搞笑', '优美短句', '日常随记', '发疯文学'];
                const selectedStyle = ref('文艺诗意');
                const userDirection = ref(""); 
                
                const isDragging = ref(false);
                const isLoading = ref(false);
                const resultText = ref("");
                const resultImageUrls = ref([]);

                const triggerUpload = () => {
                    if (fileInput.value) {
                        fileInput.value.value = '';
                        fileInput.value.click();
                    }
                };

                // 将新选择的文件追加到列表中（不超过9张）
                const addFiles = (newFiles) => {
                    const MAX_COUNT = 9;
                    let added = 0;
                    for (const f of newFiles) {
                        if (files.value.length >= MAX_COUNT) break;
                        if (!f.type.startsWith('image/')) continue;
                        files.value.push(f);
                        previewUrls.value.push(URL.createObjectURL(f));
                        added++;
                    }
                    if (files.value.length >= MAX_COUNT && newFiles.length > added) {
                        alert(`最多支持 ${MAX_COUNT} 张图片，已自动截取前 ${MAX_COUNT} 张。`);
                    }
                };

                const handleFileChange = (e) => {
                    const selectedFiles = e.target.files;
                    if (selectedFiles && selectedFiles.length > 0) {
                        addFiles(selectedFiles);
                    }
                    e.target.value = '';
                };

                const handleDrop = (e) => {
                    isDragging.value = false;
                    const droppedFiles = e.dataTransfer.files;
                    if (droppedFiles.length > 0) {
                        addFiles(droppedFiles);
                    }
                };

                const removeImage = (index) => {
                    URL.revokeObjectURL(previewUrls.value[index]);
                    files.value.splice(index, 1);
                    previewUrls.value.splice(index, 1);
                };

                // Canvas 图片压缩：限制最长边 + 控制质量
                const compressImage = (file) => {
                    return new Promise((resolve, reject) => {
                        const MAX_LONG_EDGE = 1920;
                        const QUALITY = 0.85;

                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onerror = () => reject(new Error('Failed to read file'));
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onerror = () => reject(new Error('Failed to load image'));
                            img.onload = () => {
                                try {
                                    let { width, height } = img;

                                    if (width > MAX_LONG_EDGE || height > MAX_LONG_EDGE) {
                                        const ratio = Math.min(MAX_LONG_EDGE / width, MAX_LONG_EDGE / height);
                                        width = Math.round(width * ratio);
                                        height = Math.round(height * ratio);
                                    }

                                    const canvas = document.createElement('canvas');
                                    canvas.width = width;
                                    canvas.height = height;
                                    const ctx = canvas.getContext('2d');
                                    ctx.drawImage(img, 0, 0, width, height);

                                    canvas.toBlob(
                                        (blob) => {
                                            if (!blob) {
                                                reject(new Error('Canvas compression failed'));
                                                return;
                                            }
                                            const compressed = new File([blob], file.name || 'image.jpg', { type: 'image/jpeg' });
                                            resolve(compressed);
                                        },
                                        'image/jpeg',
                                        QUALITY
                                    );
                                } catch (err) {
                                    reject(err);
                                }
                            };
                            img.src = e.target.result;
                        };
                    });
                };

                const generateCopy = async () => {
                    if (files.value.length === 0) return;
                    
                    isLoading.value = true;
                    resultText.value = "";
                    resultImageUrls.value = [];
                    
                    let finalPrompt = `请严格使用【${selectedStyle.value}】的风格来生成。`;
                    if (userDirection.value.trim() !== '') {
                        finalPrompt += `用户的具体要求是：${userDirection.value}`;
                    }

                    try {
                        // 串行压缩所有图片（避免移动端内存溢出）
                        const compressedFiles = [];
                        for (const f of files.value) {
                            const compressed = await compressImage(f);
                            compressedFiles.push(compressed);
                        }
                        
                        const formData = new FormData();
                        compressedFiles.forEach(f => {
                            formData.append("images", f);
                        });
                        formData.append("user_direction", finalPrompt);

                        const response = await fetch("https://ai-moment-generator.vercel.app/api/generate", {
                            method: "POST",
                            body: formData
                        });

                        const res = await response.json();
                        
                        if (res.code === 0) {
                            resultText.value = res.data.ai_copywriting;
                            resultImageUrls.value = res.data.cos_urls || [];
                            
                            setTimeout(() => {
                                resultArea.value?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                            }, 150);
                            
                        } else {
                            alert("生成出错了：" + res.message);
                        }
                    } catch (error) {
                        console.error(error);
                        alert("网络请求失败：" + (error.message || "请检查后端环境"));
                    } finally {
                        isLoading.value = false;
                    }
                };

                return { 
                    fileInput, files, previewUrls, resultArea,
                    predefinedStyles, selectedStyle, userDirection,
                    isDragging, isLoading, resultText, resultImageUrls, 
                    triggerUpload, handleFileChange, handleDrop, removeImage, generateCopy 
                };
            }
        }).mount('#app')
    </script>
</body>
</html>
